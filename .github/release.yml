changelog:
  categories:
    - title: "Breaking Changes"
      labels: ["breaking-change"]
    - title: "New Features"
      labels: ["feat"]
    - title: "Bug Fixes"
      labels: ["fix"]
    - title: "Performance"
      labels: ["perf"]
    - title: "Documentation"
      labels: ["docs"]
    - title: "Maintenance"
      labels: ["chore", "refactor", "build", "ci", "style", "test"]
  exclude:
    labels: ["skip-changelog"]
